apiVersion: apps/v1
kind: Deployment
metadata:
  name: kustom-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kustom-app
  template:
    metadata:
      labels:
        app: kustom-app
    spec:
      containers:
        - name: app
          image: nginx:1.25.3
          ports:
            - containerPort: 80
