apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

commonLabels:
  env: staging

resources:
  - deployment.yaml
  - service.yaml

patches:
  - target:
      kind: Deployment
      name: kustom-app
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
