apiVersion: apps/v1
kind: Deployment
metadata:
  name: operator-test
  namespace: production
  labels:
    app: operator-test
    tier: backend
    app.kubernetes.io/name: operator-test
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: app
          image: "myregistry.io/app:v2.1.0"
          ports:
            - containerPort: 8080
            - containerPort: 9090
            - containerPort: 9091
          env:
            - name: APP_ENV
              value: production
            - name: LOG_LEVEL
              value: warn
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
