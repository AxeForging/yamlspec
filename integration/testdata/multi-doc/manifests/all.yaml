apiVersion: apps/v1
kind: Deployment
metadata:
  name: multi-app
  namespace: default
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: app
          image: "alpine:3.19"
---
apiVersion: v1
kind: Service
metadata:
  name: multi-svc
  namespace: default
spec:
  type: NodePort
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: multi-config
  namespace: default
data:
  DB_HOST: "postgres.default.svc"
  CACHE_TTL: "300"
