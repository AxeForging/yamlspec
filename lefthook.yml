pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: gofmt -l -w {staged_files} && git add {staged_files}
    govet:
      glob: "*.go"
      run: go vet ./...
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run --timeout=5m
    structlint:
      run: structlint validate

commit-msg:
  commands:
    conventional-commits:
      run: |
        msg=$(cat {1})
        pattern="^(feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert)(\(.+\))?(!)?: .+"
        if ! echo "$msg" | grep -qE "$pattern"; then
          echo ""
          echo "  ERROR: Commit message does not follow Conventional Commits format."
          echo ""
          echo "  Expected: <type>[optional scope][!]: <description>"
          echo "  Types: feat|fix|docs|style|refactor|test|chore|build|ci|perf|revert"
          echo ""
          echo "  Examples:"
          echo "    feat: add JUnit output format"
          echo "    fix(assertions): handle nil values in toEqual"
          echo "    test: add integration tests for tag filtering"
          echo ""
          exit 1
        fi

pre-push:
  commands:
    govulncheck:
      run: govulncheck ./...
